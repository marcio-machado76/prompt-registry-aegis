# CP10 — teste informativo (LLM-as-judge) da cadeia de migração (saída aberta).
# INFORMATIVO: não barra o build (decisão a1). Como a cadeia tem 3 elos, este teste avalia o
# ELO 1 (diagnóstico) como representativo — a porta de entrada da cadeia. Juiz: Gemini; gerador: Claude Haiku 4.5.
# Exec: a partir desta pasta, `npx promptfoo@latest eval --no-cache`.
description: "CP10 juiz informativo — migração batch→streaming (elo 1: diagnóstico)"

prompts:
  - file://prompts/01-diagnostico.md

providers:
  - anthropic:messages:claude-haiku-4-5  # gerador da analise (independente do juiz Gemini)

tests:
  - description: Estado atual do Forge (CP05)
    options:
      provider: google:gemini-2.5-flash   # o JUIZ
    vars:
      estado_atual: |
        Forge hoje:
        - ingestão: um job em cron acorda a cada 60min (o "forge-batch-ingest")
        - transformação: 14 etapas de processamento encadeadas (em Spark), ~40min no total
        - destino: grava em tabelas no data warehouse, particionadas por hora
        - ponto frágil: se um lote falha, o próximo acumula o dobro de volume
        - quem depende do Forge: Sentinel (lê as tabelas agregadas), Cerebro (indexa os eventos
          transformados) e os relatórios de billing da Pepper (rodam de madrugada)

        O que a migração precisa garantir:
        - consumir do Relay continuamente, processando em pequenos blocos no lugar do lote de 1h
        - manter quem depende do Forge funcionando durante a transição
        - nada de virada única (big-bang): a migração tem que ir em passos e poder voltar atrás
    assert:
      - type: llm-rubric
        value: |
          Avalie este DIAGNÓSTICO de um pipeline batch que será migrado para streaming. Considere
          de boa qualidade (pass=true) se ele:
          - descreve o estado atual (job, etapas, destino) de forma estruturada;
          - identifica o(s) ponto(s) frágil(eis) do batch (ex.: lote que falha dobra o próximo);
          - lista quem depende do pipeline e o impacto de atraso/falha;
          - registra os requisitos que a migração não pode violar (ex.: não-perda, reversibilidade,
            manter dependentes funcionando);
          - declara suposições onde faltam dados, em vez de inventar.
          Reprove (pass=false) se for raso, inventar dados, ou ignorar dependentes/fragilidades.
          Justifique citando o que faltou.
