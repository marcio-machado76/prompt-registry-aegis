# CP08 — testes determinísticos do endurecimento de NetworkPolicy.
# Roda o manifesto permissivo + regras + mapa do CP06 contra 2 provedores.
# Exec: a partir desta pasta, `npx promptfoo@latest eval`.
description: Endurecimento de NetworkPolicy — default-deny + regras mínimas

prompts:
  - file://prompt.md

providers:
  - id: google:gemini-2.5-flash    # disponível no free tier; thinkingBudget:0 desliga reasoning -> latência < 5s
    config:
      generationConfig:
        thinkingConfig:
          thinkingBudget: 0
  - groq:llama-3.3-70b-versatile   # GROQ_API_KEY (free tier) — Meta/Llama na nuvem

tests:
  - description: Manifesto permissivo do sentinel-prod -> versão endurecida
    vars:
      manifesto: |
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: sentinel-allow
          namespace: sentinel-prod
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
            - Egress
          ingress:
            - {}
          egress:
            - {}
      regras: |
        - pods do Sentinel só aceitam tráfego de entrada do Relay e do gateway de API
        - pods do Sentinel só fazem saída para: Forge (5432), Cerebro (9200) e DNS interno
        - nada de "allow all" em ingress ou egress
        - política default-deny explícita no namespace
        - toda regra precisa de comentário dizendo qual fluxo legítimo ela libera
      mapa_servicos: |
        Sentinel     -> namespace sentinel-prod, pods com label app=sentinel
        Relay        -> namespace relay-prod,    pods com label app=relay
        API gateway  -> namespace edge,          pods com label app=api-gateway
        Forge        -> namespace forge-prod,    pods com label app=forge,   porta 5432
        Cerebro      -> namespace cerebro-prod,  pods com label app=cerebro, porta 9200
        DNS interno  -> namespace kube-system,   pods com label k8s-app=kube-dns, porta 53
    assert:
      # é YAML de NetworkPolicy com policyTypes Ingress e Egress
      - type: contains
        value: "kind: NetworkPolicy"
      - type: contains
        value: "Ingress"
      - type: contains
        value: "Egress"
      # não há allow-all
      - type: javascript
        value: "!output.includes('- {}')"
      # egress libera Forge (5432) e Cerebro (9200)
      - type: contains
        value: "5432"
      - type: contains
        value: "9200"
      # ingress libera o Relay
      - type: contains
        value: "app: relay"
      # toda regra tem comentário
      - type: contains
        value: "#"
      # limites operacionais (CP08)
      - type: latency
        threshold: 5000
      # custo: o promptfoo só calcula para provedores com tabela de preço (Gemini); Groq retorna nulo
      # -> tolerante: valida <= US$ 0,01 quando há custo, passa quando o provedor não reporta
      - type: javascript
        value: "context.providerResponse?.cost == null || context.providerResponse.cost <= 0.01"
